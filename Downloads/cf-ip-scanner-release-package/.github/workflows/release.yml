name: Build & Release

on:
  push:
    tags:
      - 'v*'   # هر وقت tag مثل v2.0.0 push شد، اجرا می‌شه

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (Intel + Apple Silicon)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "CF IP Scanner ${{ github.ref_name }}"
          body: |
            ## 🛡️ CF IP Scanner ${{ github.ref_name }}

            اسکنر حرفه‌ای IP های تمیز Cloudflare

            ### 📥 دانلود

            | پلتفرم | فایل | توضیح |
            |--------|------|-------|
            | 🪟 Windows x64 | `CF-IP-Scanner-Setup-x64.exe` | نصب‌کننده کامل |
            | 🪟 Windows x64 | `CF-IP-Scanner-Portable-x64.exe` | بدون نیاز به نصب |
            | 🍎 macOS Intel | `CF-IP-Scanner-x64.dmg` | برای Mac های قدیمی |
            | 🍎 macOS Apple Silicon | `CF-IP-Scanner-arm64.dmg` | برای M1/M2/M3 |
            | 🐧 Linux | `CF-IP-Scanner-x64.AppImage` | همه distro ها |
            | 🐧 Linux (Debian/Ubuntu) | `CF-IP-Scanner-x64.deb` | apt install |
            | 🐧 Linux (RHEL/Fedora) | `CF-IP-Scanner-x64.rpm` | rpm install |

            ### ✨ تغییرات
            - اضافه شدن تشخیص DC
            - بهبود سرعت اسکن
            - پشتیبانی از خروجی V2Ray و Clash

          files: |
            windows-build/*.exe
            mac-build/*.dmg
            linux-build/*.AppImage
            linux-build/*.deb
            linux-build/*.rpm
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
